name: Tests
run-name: Testing commit "${{ github.event.head_commit.message }}" in "${{ github.ref_name }}"
on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ["*"]
    branches: ["dev", "rc", "main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # postgres — tests create per-test databases via CREATE DATABASE ... TEMPLATE,
      # so the user must be a superuser (POSTGRES_USER is by default).
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: babytroc
          POSTGRES_PASSWORD: xxx
          POSTGRES_DB: babytroc
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U babytroc"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # redis — used for pubsub (broadcaster), cache, and rate limiting.
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # NOTE: S3 (seaweedfs/minio) and CAP captcha are intentionally not run as
      # services here. Both are mocked at the test-fixture level:
      #   - tests/fixtures/s3.py mocks babytroc.infrastructure.storage.upload_image_variants
      #   - tests/fixtures/antibot.py monkeypatches verify_cap_token (autouse)
      # Email is never sent because Config.test is auto-set when PYTEST_CURRENT_TEST is
      # in env. We only need stub values for the corresponding env vars so Config.from_env
      # doesn't raise KeyError at app startup.

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run test
        working-directory: ./api
        env:
          HOST_NAME: babytroc.ch
          APP_NAME: Babytroc

          # postgres
          POSTGRES_USER: babytroc
          POSTGRES_PASSWORD: xxx
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DATABASE: babytroc

          # redis
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB: "0"

          # jwt
          JWT_ALGORITHM: HS256
          JWT_SECRET_KEY: ci-jwt-secret-not-for-production
          JWT_REFRESH_TOKEN_DURATION_DAYS: "7"
          JWT_ACCESS_TOKEN_DURATION_MINUTES: "15"
          ACCOUNT_PASSWORD_RESET_AUTHORIZATION_DURATION_MINUTES: "20"

          # email (never actually used — Config.test suppresses sending)
          EMAIL_SERVER: fake.server.test
          EMAIL_PORT: "465"
          EMAIL_USERNAME: test
          EMAIL_PASSWORD: test
          EMAIL_FROM_EMAIL: noreply@example.com
          EMAIL_FROM_NAME: Babytroc CI

          # s3 (mocked at fixture level)
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: test
          S3_BUCKET: babytroc-test
          S3_PUBLIC_URL: http://localhost:9000/babytroc-test

          # contact
          CONTACT_EMAIL: contact@babytroc.ch

          # cap captcha (mocked at fixture level)
          CAP_API_URL: http://localhost:3482
          CAP_SITE_KEY: ci-cap-site-key
          CAP_SECRET_KEY: ci-cap-secret-key
