name: Tests
run-name: Testing commit "${{ github.event.head_commit.message }}" in "${{ github.ref_name }}"
on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ["*"]
    branches: ["dev", "rc", "main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:latest
        command: -c 'max_connections=400'
        env:
          POSTGRES_USER: babytroc
          POSTGRES_PASSWORD: xxx
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U babytroc"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      prometheus:
        image: prom/prometheus:latest
        ports:
          - 9090:9090
      imgpush:
        image: hauxir/imgpush
        env:
          MAX_UPLOADS_PER_MINUTE: 100
          MAX_UPLOADS_PER_HOUR: 1000
          MAX_UPLOADS_PER_DAY: 10000
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run test
        working-directory: ./api
        env:
          HOST_NAME: test
          APP_NAME: test
          POSTGRES_USER: babytroc
          POSTGRES_PASSWORD: xxx
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DATABASE: babytroc
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          PROMETHEUS_URL: "http://localhost:9090"
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: "1234"
          JWT_REFRESH_TOKEN_DURATION_DAYS: "7"
          JWT_ACCESS_TOKEN_DURATION_MINUTES: "15"
          ACCOUNT_PASSWORD_RESET_AUTHORIZATION_DURATION_MINUTES: "20"
          EMAIL_SERVER: "fake.server.test"
          EMAIL_PORT: "465"
          EMAIL_USERNAME: "test"
          EMAIL_PASSWORD: "test"
          EMAIL_FROM_EMAIL: "pqhyhijbblvtncgj@cbnfukghppneopdz.com"
          EMAIL_FROM_NAME: "test"
          S3_ENDPOINT_URL: "http://localhost:9000"
          S3_ACCESS_KEY: "test"
          S3_SECRET_KEY: "test"
          S3_BUCKET: "test"
          S3_PUBLIC_URL: "http://localhost:9000/test"
